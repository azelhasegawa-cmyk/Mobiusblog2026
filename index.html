<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBIUS 2026</title>
    
    <link rel="stylesheet" href="css/Style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1 class="glow-title">MOBIUS 2026</h1>
        <nav id="main-nav">
            <button class="nav-btn active">HOME</button>
            <button class="nav-btn">ABOUT</button>
            <button class="nav-btn">MOTIVATION</button>
            <button class="nav-btn">GUIDELINES</button>
            <button class="nav-btn">TYPES</button>
            <button class="nav-btn">PLATFORMS</button>
            <button class="nav-btn">ANATOMY</button>
            <button class="nav-btn">STEPS</button>
        </nav>
    </header>

    <main>
        <div class="glass-card">
            <h2 class="card-title">MOBIUS 2026</h2>
            
            <div class="image-wrapper">
                <img src="images/YOUR_IMAGE_HERE.jpg" alt="Mobius Group" class="main-photo">
            </div>
            
            <h3 class="grade-tag">Grade 11-Mobius</h3>
            <p class="intro-text">Explore the creative world of blogging with 11-Mobius.</p>
        </div>
    </main>

    <footer>
        <p>EST. MOBIUS 2026</p>
    </footer>

    <script>
        const buttons = document.querySelectorAll('.nav-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                console.log(`Navigating to ${btn.innerText}`);
            });
        });
    </script>
</body>
</html>
